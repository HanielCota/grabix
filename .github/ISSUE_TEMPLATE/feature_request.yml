name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement", "needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for your suggestion. Please describe it clearly.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What's the use case?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature or change you'd like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered other approaches?
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, mockups, links, or any other relevant info.
    validations:
      required: false
