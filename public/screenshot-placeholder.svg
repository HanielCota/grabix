<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="btn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="680" rx="16" fill="url(#bg)" stroke="#222" stroke-width="1"/>

  <!-- Icon -->
  <g transform="translate(576, 60)">
    <rect width="48" height="48" rx="14" fill="#151515" stroke="#333" stroke-width="1"/>
    <path d="M16 28c0-4.418 3.582-8 8-8s8 3.582 8 8" stroke="#d4d4d4" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M24 24v10m0 0l-4-4m4 4l4-4" stroke="#d4d4d4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Title -->
  <text x="600" y="160" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#e5e5e5" letter-spacing="-3">GRABIX</text>

  <!-- Subtitle -->
  <text x="600" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="17" fill="#737373">Cola a URL de qualquer pagina publica, o Grabix varre o HTML</text>
  <text x="600" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="17" fill="#737373">e puxa todas as imagens e videos. Baixa um por um ou tudo em ZIP.</text>

  <!-- Badges -->
  <g transform="translate(340, 260)">
    <rect width="145" height="36" rx="18" fill="none" stroke="#333" stroke-width="1"/>
    <text x="72" y="23" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#a3a3a3">Qualquer site</text>
  </g>
  <g transform="translate(505, 260)">
    <rect width="150" height="36" rx="18" fill="none" stroke="#333" stroke-width="1"/>
    <text x="75" y="23" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#a3a3a3">Leva segundos</text>
  </g>
  <g transform="translate(675, 260)">
    <rect width="145" height="36" rx="18" fill="none" stroke="#333" stroke-width="1"/>
    <text x="72" y="23" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#a3a3a3">Sem cadastro</text>
  </g>

  <!-- Label -->
  <text x="370" y="345" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#a3a3a3">URL da pagina</text>

  <!-- Input field -->
  <rect x="340" y="360" width="520" height="56" rx="16" fill="#111" stroke="#333" stroke-width="1"/>

  <!-- Search icon circle -->
  <rect x="350" y="368" width="40" height="40" rx="12" fill="#1a1a1a"/>
  <circle cx="370" cy="388" r="7" fill="none" stroke="#666" stroke-width="2"/>
  <line x1="375" y1="393" x2="378" y2="396" stroke="#666" stroke-width="2" stroke-linecap="round"/>

  <!-- Placeholder text -->
  <text x="400" y="394" font-family="system-ui, sans-serif" font-size="14" fill="#555">exemplo.com/galeria ou cole a URL completa</text>

  <!-- Button -->
  <rect x="720" y="370" width="130" height="40" rx="12" fill="url(#btn)" stroke="#444" stroke-width="0.5"/>
  <text x="770" y="395" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#e5e5e5">Extrair midias</text>
  <path d="M808 390l5-5m0 0l-5-5m5 5h-10" stroke="#e5e5e5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" transform="translate(-2, 0)"/>

  <!-- Quick examples -->
  <text x="510" y="445" font-family="system-ui, sans-serif" font-size="12" fill="#555">Testa com:</text>
  <text x="570" y="445" font-family="system-ui, sans-serif" font-size="12" fill="#888" text-decoration="underline">Wikipedia</text>
  <text x="630" y="445" font-family="system-ui, sans-serif" font-size="12" fill="#666">.</text>
  <text x="642" y="445" font-family="system-ui, sans-serif" font-size="12" fill="#888" text-decoration="underline">Pexels</text>
  <text x="686" y="445" font-family="system-ui, sans-serif" font-size="12" fill="#666">.</text>
  <text x="698" y="445" font-family="system-ui, sans-serif" font-size="12" fill="#888" text-decoration="underline">Unsplash</text>

  <!-- Divider -->
  <line x1="200" y1="560" x2="1000" y2="560" stroke="#222" stroke-width="1"/>

  <!-- Footer -->
  <text x="600" y="600" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#525252">So le o HTML publico. Nao pula login, nao quebra DRM, nao faz magica.</text>
</svg>
